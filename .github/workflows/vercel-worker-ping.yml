name: Trigger Vercel Launch Worker

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  ping-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger worker endpoint
        env:
          WORKER_TRIGGER_URL: ${{ secrets.WORKER_TRIGGER_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$WORKER_TRIGGER_URL" ]; then
            echo "Missing secret: WORKER_TRIGGER_URL"
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "Missing secret: CRON_SECRET"
            exit 1
          fi

          curl --fail --show-error --silent \
            -X POST "$WORKER_TRIGGER_URL" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "content-type: application/json" \
            --data '{"source":"github-actions"}'
